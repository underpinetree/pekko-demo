apiVersion: apps/v1
kind: Deployment
metadata:
  name: pekko-demo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pekko-demo
  template:
    metadata:
      labels:
        app: pekko-demo
    spec:
      serviceAccountName: pekko-demo
      containers:
        - name: pekko-demo
          image: pekko-demo:latest
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8080
            - name: management
              containerPort: 8558
            - name: remoting
              containerPort: 25520
          env:
            - name: PEKKO_HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: JAVA_TOOL_OPTIONS
              value: -Dconfig.resource=application-k8s.conf
          readinessProbe:
            httpGet:
              path: /ready
              port: 8558
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /alive
              port: 8558
            initialDelaySeconds: 30
            periodSeconds: 10
