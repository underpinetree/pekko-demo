apiVersion: v1
kind: ServiceAccount
metadata:
  name: pekko-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pekko-demo
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pekko-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pekko-demo
subjects:
  - kind: ServiceAccount
    name: pekko-demo
