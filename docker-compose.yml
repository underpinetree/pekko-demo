networks:
  pekko-net:
    driver: bridge

services:
  postgres:
    image: postgres:17
    networks:
      - pekko-net
    environment:
      POSTGRES_DB: pekko
      POSTGRES_USER: pekko
      POSTGRES_PASSWORD: pekko
    ports:
      - "5432:5432"

  node1:
    build: .
    hostname: node1
    networks:
      - pekko-net
    ports:
      - "8081:8080"
    environment:
      PEKKO_HOSTNAME: node1
      JAVA_TOOL_OPTIONS: -Dconfig.resource=application-docker.conf
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pekko
    depends_on:
      - postgres

  node2:
    build: .
    hostname: node2
    networks:
      - pekko-net
    ports:
      - "8082:8080"
    environment:
      PEKKO_HOSTNAME: node2
      JAVA_TOOL_OPTIONS: -Dconfig.resource=application-docker.conf
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pekko
    depends_on:
      - node1

  node3:
    build: .
    hostname: node3
    networks:
      - pekko-net
    ports:
      - "8083:8080"
    environment:
      PEKKO_HOSTNAME: node3
      JAVA_TOOL_OPTIONS: -Dconfig.resource=application-docker.conf
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pekko
    depends_on:
      - node1
